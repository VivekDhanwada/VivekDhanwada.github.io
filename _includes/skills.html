<style>
  :root {
    --skill-text: #333333;
    --skill-percentage: #555555;
    --progress-bg: rgba(0, 0, 0, 0.1);
    --progress-fill: #3498db;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --skill-text: #e0e0e0;
      --skill-percentage: #bbbbbb;
      --progress-bg: rgba(255, 255, 255, 0.35);
      --progress-fill: #4da3ff;
    }
  }

  .skill-name {
    color: var(--skill-text);
    font-size: 1rem; /* larger text */
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .skill-percentage {
    color: var(--skill-percentage);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    min-width: 40px;
    text-align: right;
    font-family: 'Courier New', monospace;
  }

  .skill-bar-fill {
    transition: width 1s ease-in-out;
  }

  .progress {
    width: 95%;
    height: 10px; /* thicker bars */
    background-color: var(--progress-bg);
    border-radius: 6px;
  }

  .progress-bar {
    width: 0; /* set via JS */
    background-color: var(--progress-fill);
    border-radius: 6px;
    transition: all 0.3s ease-in-out;
  }

  .progress-bar:hover {
    filter: brightness(1.1);
    transform: scaleY(1.1);
  }
</style>

<style>
  [data-theme="light"] .skill-name,
  [data-theme="light"] .skill-percentage {
    color: #111 !important;
  }

  [data-theme="dark"] .skill-name,
  [data-theme="dark"] .skill-percentage {
    color: #f5f5f5 !important;
  }
</style>

<div class="row">
  <div class="col-md-6">
    {% for skill in site.data.technical-skills limit: 8 %}
    <div class="mb-5">
      <div class="d-flex justify-content-between">
        <span class="skill-name">{{ skill.name }}</span>
        <span class="skill-percentage">{{ skill.percentage }}%</span>
      </div>
      <div class="progress">
        <div class="progress-bar skill-bar-fill"
             role="progressbar"
             data-percentage="{{ skill.percentage }}"
             data-color="{{ skill.color }}"
             aria-valuenow="{{ skill.percentage }}"
             aria-valuemin="0"
             aria-valuemax="100">
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

  <div class="col-md-6">
    {% for skill in site.data.technical-skills offset:8 %}
    <div class="mb-5">
      <div class="d-flex justify-content-between">
        <span class="skill-name">{{ skill.name }}</span>
        <span class="skill-percentage">{{ skill.percentage }}%</span>
      </div>
      <div class="progress">
        <div class="progress-bar skill-bar-fill"
             role="progressbar"
             data-percentage="{{ skill.percentage }}"
             data-color="{{ skill.color }}"
             aria-valuenow="{{ skill.percentage }}"
             aria-valuemin="0"
             aria-valuemax="100">
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<script>
 (function () {
  var bars = document.querySelectorAll('.progress-bar.skill-bar-fill');
  bars.forEach(function (bar) {
    var pct = parseFloat(bar.getAttribute('data-percentage')) || 0;
    var color = bar.getAttribute('data-color');
    bar.style.width = pct + '%';
    bar.style.backgroundColor = color || getComputedStyle(bar).getPropertyValue('--progress-fill').trim();
  });
})();
</script>
