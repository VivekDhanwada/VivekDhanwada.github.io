<div class="row justify-content-center align-items-center p-4">
  <div class="col-lg-8 col-md-10 text-center mt-5 mx-auto">
    <div class="landing-card">

      <div class="landing-card-top">

        <!-- Avatar -->
        <div class="d-flex justify-content-center">
          <div class="avatar-container">
            {% if site.author.image %}
              <img class="home__img mx-auto" src="{{ site.author.image }}" alt="{{ site.author.name }} profile photo">
            {% else %}
              <img class="img-fluid rounded-circle shadow-lg mx-auto" src="https://ui-avatars.com/api/?name={{ site.title }}&background=random" alt="{{ site.title }}" style="object-fit: cover;">
            {% endif %}
          </div>
        </div>

        <!-- Role label -->
        <p class="landing-role-label">Business Analytics Graduate | Macquarie University</p>

        <!-- Name -->
        <h1 class="landing-hero-name">Hi, I'm Vivek</h1>

        <!-- Tagline -->
        <p class="landing-tagline">I turn messy data into clear decisions.</p>

      </div>

      <div class="landing-card-bottom">
        <div class="d-flex justify-content-center">
          <a class="btn btn-outline-dark btn-lg shadow-sm d-flex align-items-center resume" href="/resume.pdf" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-file-pdf"></i>
            <span>Resume</span>
          </a>
          <a class="btn btn-outline-dark btn-lg shadow-sm d-flex align-items-center github" href="https://github.com/VivekDhanwada" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-github"></i>
            <span>GitHub</span>
          </a>
          <a class="btn btn-outline-dark btn-lg shadow-sm d-flex align-items-center linkedin" href="https://www.linkedin.com/in/vivek-dhanwada/" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-linkedin-in"></i>
            <span>LinkedIn</span>
          </a>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Scroll Down Arrow -->
<div class="text-center mt-4">
  <div class="scroll-down" id="scrollArrow" onclick="scrollToAbout()">
    <i class="fas fa-chevron-down"></i>
  </div>
</div>
